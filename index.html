                'shapes/webcam.png', 'shapes/target.png', 'shapes/trail.png', 'shapes/ranger_station.png'
            ],
            'Letters': [...Array(26)].map((_, i) => `paddle/${String.fromCharCode(65 + i)}.png`),
            'Numbers': [...Array(10)].map((_, i) => `paddle/${i + 1}.png`),
            'Palette 2': [...Array(64)].map((_, i) => `pal2/icon${i}.png`),
            'Palette 3': [...Array(64)].map((_, i) => `pal3/icon${i}.png`),
            'Palette 4': [...Array(64)].map((_, i) => `pal4/icon${i}.png`),
            'Palette 5': [...Array(64)].map((_, i) => `pal5/icon${i}.png`)
        };

        const getIconUrl = (url) => {
            if (!url || url === 'VECTOR_CIRCLE') return null;
            if (url.startsWith('http')) return url;
            return GE_ICON_BASE + '/' + url;
        };

        const createCustomIcon = (iconUrl, color, scale, opacity) => {
            const s = Math.round(24 * scale);
            const op = opacity / 100;

            if (!iconUrl || iconUrl === 'VECTOR_CIRCLE') {
                return L.divIcon({
                    className: 'custom-shape-icon',
                    html: `<div style="width: ${s}px; height: ${s}px; background: ${color}; border-radius: 50%; opacity: ${op}; border: 1px solid #fff;"></div>`,
                    iconSize: [s, s],
                    iconAnchor: [s / 2, s / 2],
                    popupAnchor: [0, -s / 2]
                });
            }

            const fullUrl = getIconUrl(iconUrl);
            if (!fullUrl) {
                return L.divIcon({
                    className: 'custom-shape-icon',
                    html: `<div style="width: ${s}px; height: ${s}px; background: ${color}; border-radius: 50%; opacity: ${op}; border: 1px solid #fff;"></div>`,
                    iconSize: [s, s],
                    iconAnchor: [s / 2, s / 2],
                    popupAnchor: [0, -s / 2]
                });
            }

            const html = `<div style="width: ${s}px; height: ${s}px; display: flex; align-items: center; justify-content: center; opacity: ${op}; position: relative;">
                            <img src="${fullUrl}" style="width: ${s}px; height: ${s}px; object-fit: contain;" onerror="this.style.display='none'; this.parentElement.querySelector('.fallback-circle').style.display='flex';" />
                            <div class="fallback-circle" style="display: none; position: absolute; width: ${s * 0.8}px; height: ${s * 0.8}px; background: ${color}; border-radius: 50%; border: 2px solid #fff;"></div>
                          </div>`;
            return L.divIcon({
                className: 'custom-shape-icon',
                html: html,
                iconSize: [s, s],
                iconAnchor: [s / 2, s],
                popupAnchor: [0, -s]
            });
        };

        const MapView = ({ data, mapping, markerSize, markerOpacity, markerIconUrl, colorMode, singleColor, categoryCol, colorAssignmentMode, manualCategoryStyles, mapLayer, sidebarOpen, showLegend = true, showSiteLabels = false }) => {
            const mapRef = useRef(null);
            const mapInst = useRef(null);
            const layerGroupRef = useRef(null);
            const baseLayerRef = useRef(null);
            const boundsRef = useRef([]);

            const [legendStats, setLegendStats] = useState({ total: 0, items: [] });

            const centerOnData = () => {
                if (mapInst.current && boundsRef.current.length > 0) {
                    mapInst.current.fitBounds(boundsRef.current, { padding: [50, 50], maxZoom: 14 });
                }
            };

            const MAP_LAYERS = {
                light: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
                dark: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
                satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                osm: 'https://tile.openstreetmap.de/{z}/{x}/{y}.png'
            };

            const MAP_LAYER_OPTS = {
                light: { subdomains: 'abcd', maxZoom: 19, attribution: '' },
                dark: { subdomains: 'abcd', maxZoom: 19, attribution: '' },
                satellite: { maxZoom: 19, attribution: '' },
                osm: { maxZoom: 19, attribution: '' }
            };

            useEffect(() => {
                if (!mapInst.current && mapRef.current) {
                    mapInst.current = L.map(mapRef.current, { zoomControl: false, preferCanvas: true, attributionControl: false }).setView([20, 0], 2);
                    const layerOpts = MAP_LAYER_OPTS[mapLayer] || { maxZoom: 19 };
                    baseLayerRef.current = L.tileLayer(MAP_LAYERS[mapLayer], {
                        ...layerOpts,
                        errorTileUrl: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMj56IiBoZWlnaHQ9IjI2IiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIyNiIgaGVpZ2h0PSIyNiIgZmlsbD0iI2YwZjBmMCIvPjwvc3ZnPg=='
                    }).addTo(mapInst.current);
                    
                    layerGroupRef.current = L.layerGroup().addTo(mapInst.current);
                }
                return () => {
                    if (mapInst.current) {
                        mapInst.current.remove();
                        mapInst.current = null;
                        layerGroupRef.current = null;
                    }
                };
            }, []);

            useEffect(() => {
                const timer = setTimeout(() => {
                    if (mapInst.current) mapInst.current.invalidateSize();
                }, 300);
                return () => clearTimeout(timer);
            }, [sidebarOpen]);

            useEffect(() => {
                if (baseLayerRef.current && mapInst.current) {
                    mapInst.current.removeLayer(baseLayerRef.current);
                    const layerOpts = MAP_LAYER_OPTS[mapLayer] || { maxZoom: 19 };
                    baseLayerRef.current = L.tileLayer(MAP_LAYERS[mapLayer], layerOpts).addTo(mapInst.current);
                }
            }, [mapLayer]);

            useEffect(() => {
                if (!mapInst.current) return;

                layerGroupRef.current.clearLayers();
                
                if (!data.length || !mapping.lat || !mapping.lng) {
                    setLegendStats({ total: 0, items: [] });
                    return;
                }

                const bounds = [];
                const catCounts = {};
                const catColorsMap = {};
                const catIconsMap = {};
                let catIdx = 0;
                let totalPlotted = 0;

                data.forEach(row => {
                    const lat = parseFloat(row[mapping.lat]);
                    const lng = parseFloat(row[mapping.lng]);

                    if (isNaN(lat) || isNaN(lng)) return;
                    bounds.push([lat, lng]);
                    totalPlotted++;

                    let color = singleColor;
                    let iconUrl = markerIconUrl;
                    
                    if (colorMode === 'category' && categoryCol && row[categoryCol] !== undefined) {
                        const val = String(row[categoryCol]);
                        
                        if (!catColorsMap[val]) {
                            catColorsMap[val] = PALETTE[catIdx % PALETTE.length];
                            catIconsMap[val] = DEFAULT_GE_PADDLES[catIdx % DEFAULT_GE_PADDLES.length];
                            catIdx++;
                        }

                        if (colorAssignmentMode === 'manual' && manualCategoryStyles && manualCategoryStyles[val]) {
                            color = manualCategoryStyles[val].color;
                            iconUrl = manualCategoryStyles[val].iconUrl || catIconsMap[val];
                        } else {
                            color = catColorsMap[val];
                            iconUrl = catIconsMap[val];
                        }
                        
                        catCounts[val] = (catCounts[val] || 0) + 1;
                    }

                    const marker = L.marker([lat, lng], {
                        icon: createCustomIcon(iconUrl, color, markerSize, markerOpacity)
                    });

                    let popupHTML = `<div style="font-size: 13px;">${(mapping.siteName && row[mapping.siteName]) || ''}<hr style="margin: 4px 0;">`;

                    if (mapping.popupCols && mapping.popupCols.length > 0) {
                        mapping.popupCols.forEach(col => {
                            popupHTML += `<div><b>${col}:</b> ${row[col] ?? ''}</div>`;
                        });
                    }

                    popupHTML += `</div>`;
                    marker.bindPopup(popupHTML);

                    if (showSiteLabels && mapping.siteName && row[mapping.siteName] !== undefined && row[mapping.siteName] !== '') {
                        marker.bindTooltip(row[mapping.siteName], {
                            permanent: true,
                            direction: 'top',
                            className: 'site-label-tooltip',
                            offset: [0, -(24 * markerSize)]
                        });
                    }

                    layerGroupRef.current.addLayer(marker);
                });

                if (bounds.length > 0) {
                    mapInst.current.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
                    boundsRef.current = bounds;
                }

                if (colorMode === 'category' && categoryCol) {
                    const sortedItems = Object.keys(catCounts).map(cat => {
                        const manStyle = manualCategoryStyles && manualCategoryStyles[cat];
                        return {
                            label: cat,
                            color: (colorAssignmentMode === 'manual' && manStyle && manStyle.color) ? manStyle.color : catColorsMap[cat],
                            iconUrl: (colorAssignmentMode === 'manual' && manStyle && manStyle.iconUrl) ? manStyle.iconUrl : catIconsMap[cat],
                            count: catCounts[cat]
                        };
                    }).sort((a, b) => b.count - a.count);

                    setLegendStats({ total: totalPlotted, items: sortedItems });
                } else {
                    setLegendStats({ total: totalPlotted, items: [] });
                }

            }, [data, mapping, markerSize, markerOpacity, markerIconUrl, colorMode, singleColor, categoryCol, colorAssignmentMode, manualCategoryStyles, showSiteLabels]);

            return (
                <div style={{ position: 'relative', width: '100%', height: '100%' }}>
                    <div ref={mapRef} id="map"></div>

                    {showLegend && legendStats.total > 0 && (
                        <div className="map-legend" style={{ left: '24px', right: 'auto' }}>
                            <div style={{ fontSize: '11px', fontWeight: 800, textTransform: 'uppercase', color: '#64748b', borderBottom: '1px solid #e2e8f0', paddingBottom: '8px', marginBottom: '8px' }}>
                                Map Legend  <span style={{ float: 'right', color: 'var(--accent)' }}>TOTAL: {legendStats.total}</span>
                            </div>

                            {legendStats.items.length > 0 ? (
                                <div>
                                    {legendStats.items.map((item, idx) => (
                                        <div key={idx} className="legend-row">
                                            <div style={{ display: 'flex', alignItems: 'center', overflow: 'hidden' }}>
                                                {item.iconUrl && item.iconUrl !== 'VECTOR_CIRCLE' ? (
                                                    <img src={getIconUrl(item.iconUrl)} alt="" style={{ width: '14px', height: '14px', objectFit: 'contain', marginRight: '8px', flexShrink: 0 }} onError={e => { e.target.style.display='none'; }} />
                                                ) : (
                                                    <span className="legend-color-box" style={{ background: item.color }}></span>
                                                )}
                                                <span className="legend-label" title={item.label}>{item.label || 'N/A'}</span>
                                            </div>
                                            <span className="legend-count">{item.count}</span>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="legend-row" style={{ marginTop: '8px' }}>
                                    <div style={{ display: 'flex', alignItems: 'center' }}>
                                        <span className="legend-color-box" style={{ background: singleColor }}></span>
                                        <span className="legend-label">All Points</span>
                                    </div>
                                    <span className="legend-count">{legendStats.total}</span>
                                </div>
                            )}
                        </div>
                    )}

                    <div className="map-controls-group">
                        <div className="leaflet-control-zoom leaflet-bar leaflet-control">
                            <a className="leaflet-control-zoom-in" href="#" title="Zoom in" role="button" onClick={(e) => { e.preventDefault(); mapInst.current.zoomIn(); }}>+</a>
                            <a className="leaflet-control-zoom-out" href="#" title="Zoom out" role="button" onClick={(e) => { e.preventDefault(); mapInst.current.zoomOut(); }}>-</a>
                        </div>
                        <button className="map-control-btn" onClick={centerOnData} title="Center on Data">
                            <Icons.Maximize />
                        </button>
                    </div>
                </div>
            );
        };

        const MAP_THUMBNAILS = {
            light: 'https://basemaps.cartocdn.com/light_all/3/4/3.png',
            dark: 'https://basemaps.cartocdn.com/dark_all/3/4/3.png',
            satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/3/3/3',
            osm: 'https://tile.openstreetmap.de/3/4/3.png'
        };

        const MAP_LABELS = { light: 'Light', dark: 'Dark', satellite: 'Satellite', osm: 'OSM' };

        const MapLayerSwitcher = ({ mapLayer, onLayerChange }) => {
            const [expanded, setExpanded] = useState(false);
            const wrapperRef = useRef(null);

            useEffect(() => {
                const handleClick = (e) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setExpanded(false);
                };
                document.addEventListener('mousedown', handleClick);
                return () => document.removeEventListener('mousedown', handleClick);
            }, []);

            const layers = ['light', 'dark', 'satellite', 'osm'];

            if (!expanded) {
                return (
                    <div className="layer-switcher" ref={wrapperRef}>
                        <div className="layer-switcher-collapsed" onClick={() => setExpanded(true)} title="Change map style">
                            <img src={MAP_THUMBNAILS[mapLayer]} alt={MAP_LABELS[mapLayer]} />
                        </div>
                    </div>
                );
            }

            return (
                <div className="layer-switcher" ref={wrapperRef}>
                    <div className="layer-switcher-expanded" onMouseLeave={() => setExpanded(false)}>
                        {layers.map(key => (
                            <div
                                key={key}
                                className={`layer-tile ${mapLayer === key ? 'active' : ''}`}
                                onClick={() => { onLayerChange(key); setExpanded(false); }}
                            >
                                <div className="layer-tile-img">
                                    <img src={MAP_THUMBNAILS[key]} alt={MAP_LABELS[key]} />
                                </div>
                                <div className="layer-tile-label">{MAP_LABELS[key]}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const IconPicker = ({ isOpen, onClose, onSelect, currentIconUrl, currentSize, currentOpacity, setMarkerSize, setMarkerOpacity }) => {
            const allIcons = useMemo(() => {
                const flat = [];
                Object.values(GE_ICONS).forEach(list => {
                    list.forEach(path => {
                        const url = typeof path === 'number'
                            ? `${GE_ICON_BASE}/paddle/${path}.png`
                            : (path.startsWith('http') ? path : `${GE_ICON_BASE}/${path}`);
                        flat.push({ type: 'img', url, path });
                    });
                });
                return flat;
            }, []);

            if (!isOpen) return null;

            const displaySize = Math.max(1, Math.round(currentSize * 24));
            
            const getFriendlyName = (url) => {
                if (!url) return '';
                if (url === 'VECTOR_CIRCLE') return 'VECTOR CIRCLE';
                const parts = url.split('/');
                return parts[parts.length - 1].replace('.png', '').toUpperCase();
            };

            return (
                <div className="icon-modal-overlay" onClick={onClose}>
                    <div className="icon-modal-card" onClick={e => e.stopPropagation()}>
                        <div className="icon-modal-header">
                            <h3>Icon</h3>
                            <button className="icon-modal-close" onClick={onClose}>&times;</button>
                        </div>

                        <div className="icon-modal-body">
                            <div className="icon-modal-top">
                                <div className="icon-modal-preview">
                                    <img src={currentIconUrl === 'VECTOR_CIRCLE' ? '' : currentIconUrl} alt="Preview" onError={e => { e.target.style.opacity = '0.2'; }} />
                                </div>

                                <div className="icon-modal-controls">
                                    <div className="icon-modal-row">
                                        <span className="icon-modal-label">Size:</span>
                                        <input 
                                            type="number" 
                                            min="8" max="72" 
                                            value={displaySize}
                                            className="icon-modal-input"
                                            onChange={e => setMarkerSize(Math.max(1, parseInt(e.target.value) || 24) / 24)}
                                        />
                                        
                                        <span className="icon-modal-label" style={{marginLeft: '4px'}}>Opacity:</span>
                                        <select 
                                            value={currentOpacity}
                                            className="icon-modal-select"
                                            onChange={e => setMarkerOpacity(parseInt(e.target.value))}
                                        >
                                            <option value="100">100%</option>
                                            <option value="75">75%</option>
                                            <option value="50">50%</option>
                                            <option value="25">25%</option>
                                        </select>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={getFriendlyName(currentIconUrl)}
                                        readOnly
                                        className="icon-modal-name-input"
                                    />
                                </div>
                            </div>

                            <div className="icon-modal-grid-wrap">
                                <div className="icon-modal-grid">
                                    {allIcons.map((item, idx) => {
                                        const isSel = currentIconUrl === item.url;
                                        return (
                                            <div key={idx}
                                                onClick={() => onSelect(item.url)}
                                                className={`icon-modal-item ${isSel ? 'selected' : ''}`}
                                            >
                                                <img src={item.url} alt="" loading="lazy" onError={e => { e.target.style.display = 'none'; }} />
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        <div className="icon-modal-footer">
                            <button className="icon-modal-btn icon-btn-cancel" onClick={onClose}>Cancel</button>
                            <button className="icon-modal-btn icon-btn-ok" onClick={onClose}>OK</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [file, setFile] = useState(null);
            const [data, setData] = useState([]);
            const [columns, setColumns] = useState([]);

            const [mapping, setMapping] = useState({ lat: '', lng: '', siteName: '', popupCols: [] });

            const [markerIconUrl, setMarkerIconUrl] = useState('https://maps.google.com/mapfiles/kml/paddle/red-blank.png');
            const [showIconPicker, setShowIconPicker] = useState(false);
            const [editingCategory, setEditingCategory] = useState(null);

            const [markerSize, setMarkerSize] = useState(1.0);
            const [markerOpacity, setMarkerOpacity] = useState(100);

            const [colorMode, setColorMode] = useState('single');
            const [singleColor, setSingleColor] = useState('#2563eb');
            const [categoryCol, setCategoryCol] = useState('');

            const [colorAssignmentMode, setColorAssignmentMode] = useState('manual');
            const [manualCategoryStyles, setManualCategoryStyles] = useState({});

            const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth > 768);
            const [activeTab, setActiveTab] = useState('upload');

            const [isUploadOpen, setIsUploadOpen] = useState(true);
            const [isColumnsOpen, setIsColumnsOpen] = useState(true);
            const [isStyleOpen, setIsStyleOpen] = useState(true);
            const [isFilterOpen, setIsFilterOpen] = useState(true);

            const [mapLayer, setMapLayer] = useState('light');

            const [filterCol, setFilterCol] = useState('');
            const [filterVals, setFilterVals] = useState([]);
            const [showOnMap, setShowOnMap] = useState(false);
            const [isDrawing, setIsDrawing] = useState(false);
            const [drawProgress, setDrawProgress] = useState(0);
            const [searchTerm, setSearchTerm] = useState('');
            const [showLegend, setShowLegend] = useState(true);
            const [showSiteLabels, setShowSiteLabels] = useState(false);

            const fileInputRef = useRef(null);

            const handleFileUpload = (e) => {
                const f = e.target.files?.[0] || e.dataTransfer?.files?.[0];
                if (!f) return;

                setFile(f);
                const ext = f.name.split('.').pop().toLowerCase();

                if (['xlsx', 'xls'].includes(ext)) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const parsedData = XLSX.utils.sheet_to_json(ws);
                        processData(parsedData);
                    };
                    reader.readAsBinaryString(f);
                } else if (ext === 'csv' || ext === 'txt') {
                    Papa.parse(f, {
                        header: true,
                        skipEmptyLines: true,
                        dynamicTyping: true,
                        complete: (results) => processData(results.data)
                    });
                } else {
                    alert("Unsupported file format");
                    setFile(null);
                }
            };

            const processData = (parsedData) => {
                if (parsedData.length === 0) return;
                const cols = Object.keys(parsedData[0]).filter(c => c !== '#');
                setColumns(cols);
                setData(parsedData);

                const guessLat = cols.find(c => /lat|latitude|coord/i.test(c)) || '';
                const guessLng = cols.find(c => /lon|lng|longitude|coord/i.test(c)) || '';
                const guessName = cols.find(c => /name|id|site|title/i.test(c)) || '';

                setMapping({ lat: guessLat, lng: guessLng, siteName: guessName, popupCols: [] });
                setCategoryCol('');
                setFilterCol('');
                setFilterVals([]);
            };

            const uniqueFilterVals = useMemo(() => {
                if (!filterCol || !data.length) return [];
                const vals = new Set();
                data.forEach(row => {
                    if (row[filterCol] !== undefined && row[filterCol] !== null) {
                        vals.add(String(row[filterCol]));
                    }
                });
                return Array.from(vals).sort();
            }, [data, filterCol]);

            const handleFilterColChange = (e) => {
                setFilterCol(e.target.value);
                setFilterVals([]);
            };

            const uniqueCategoryVals = useMemo(() => {
                if (!categoryCol || !data.length) return [];
                const vals = new Set();
                data.forEach(row => {
                    if (row[categoryCol] !== undefined && row[categoryCol] !== null) {
                        vals.add(String(row[categoryCol]));
                    }
                });
                return Array.from(vals).sort();
            }, [data, categoryCol]);

            const filteredData = useMemo(() => {
                let result = data;
                if (searchTerm) {
                    const s = searchTerm.toLowerCase();
                    result = result.filter(row => {
                        const site = (row[mapping.siteName] || '').toLowerCase();
                        return site.includes(s);
                    });
                }
                if (filterCol && filterVals.length > 0) {
                    result = result.filter(row => filterVals.includes(String(row[filterCol])));
                }
                return result;
            }, [data, searchTerm, filterCol, filterVals, mapping.siteName]);

            const exportKML = () => {
                if (!filteredData.length || !mapping.lat || !mapping.lng) return;

                let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <name>Exported Map</name>
`;
                const hexToKml = (hex, opacity) => {
                    const r = hex.slice(1, 3), g = hex.slice(3, 5), b = hex.slice(5, 7);
                    const a = Math.round((opacity ?? markerOpacity) / 100 * 255).toString(16).padStart(2, '0');
                    return (a + b + g + r).toLowerCase();
                };

                const styles = {};
                const catColorsMap = {};
                const catIconsMap = {};
                let catIdx = 0;

                if (colorMode === 'category' && categoryCol) {
                    filteredData.forEach(row => {
                        if (row[categoryCol] !== undefined) {
                            const val = String(row[categoryCol]);
                            let color, iconUrl;
                            
                            if (!catColorsMap[val]) { 
                                catColorsMap[val] = PALETTE[catIdx % PALETTE.length]; 
                                catIconsMap[val] = DEFAULT_GE_PADDLES[catIdx % DEFAULT_GE_PADDLES.length];
                                catIdx++; 
                            }
                            
                            if (colorAssignmentMode === 'manual' && manualCategoryStyles[val]) {
                                color = manualCategoryStyles[val].color || catColorsMap[val];
                                iconUrl = manualCategoryStyles[val].iconUrl || catIconsMap[val];
                            } else {
                                color = catColorsMap[val];
                                iconUrl = catIconsMap[val];
                            }

                            const kmlColor = hexToKml(color, markerOpacity);
                            const iconScale = markerSize;
                            if (val && !styles[val]) {
                                let finalIconUrl = iconUrl;
                                const isVector = finalIconUrl === 'VECTOR_CIRCLE' || !finalIconUrl;
                                if (isVector) finalIconUrl = 'http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png';
                                const styleColor = isVector ? kmlColor : hexToKml('#ffffff', markerOpacity);
                                styles[val] = `
  <Style id="cat_${val.replace(/[^a-z0-9]/gi, '_')}">
    <IconStyle><color>${styleColor}</color><scale>${iconScale}</scale><Icon><href>${finalIconUrl}</href></Icon></IconStyle>
    <LabelStyle><scale>0.7</scale></LabelStyle>
    <BalloonStyle><text><![CDATA[$[description]]]></text></BalloonStyle>
  </Style>`;
                            }
                        }
                    });
                } else {
                    const kmlColor = hexToKml(singleColor, markerOpacity);
                    const iconScale = markerSize;
                    let finalIconUrl = markerIconUrl;
                    const isVector = finalIconUrl === 'VECTOR_CIRCLE' || !finalIconUrl;
                    if (isVector) finalIconUrl = 'http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png';
                    const styleColor = isVector ? kmlColor : hexToKml('#ffffff', markerOpacity);
                    styles['default'] = `
  <Style id="style_default">
    <IconStyle><color>${styleColor}</color><scale>${iconScale}</scale><Icon><href>${finalIconUrl}</href></Icon></IconStyle>
    <LabelStyle><scale>0.7</scale></LabelStyle>
    <BalloonStyle><text><![CDATA[$[description]]]></text></BalloonStyle>
  </Style>`;
                }

                kml += Object.values(styles).join('\n');
                const popupColumns = (mapping.popupCols && mapping.popupCols.length > 0) ? mapping.popupCols : [];

                filteredData.forEach((row, i) => {
                    const lat = parseFloat(row[mapping.lat]), lng = parseFloat(row[mapping.lng]);
                    if (isNaN(lat) || isNaN(lng)) return;

                    const siteName = (mapping.siteName && row[mapping.siteName]) ? String(row[mapping.siteName]) : `Point ${i + 1}`;
                    let desc = '';
                    if (popupColumns.length > 0) {
                        desc = `<![CDATA[<div style="font-size:13px;"><b>${siteName}</b><hr style="margin:4px 0;">` ;
                        popupColumns.forEach(k => { desc += `<div><b>${k}:</b> ${row[k] ?? ''}</div>`; });
                        desc += '</div>]]>';
                    }
                    const name = siteName;
                    let styleId = 'style_default';
                    if (colorMode === 'category' && categoryCol && row[categoryCol] !== undefined) {
                        const val = String(row[categoryCol]);
                        styleId = `cat_${val.replace(/[^a-z0-9]/gi, '_')}`;
                    }

                    kml += `  <Placemark>
    <name>${name}</name>
    <description>${desc}</description>
    <styleUrl>#${styleId}</styleUrl>
    <Point><coordinates>${lng},${lat},0</coordinates></Point>
  </Placemark>\n`;
                });
                kml += `</Document></kml>`;

                const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", "export.kml");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="app-wrapper">
                    <header className="global-header">
                        <button className="toggle-btn" onClick={() => setSidebarOpen(prev => !prev)} style={{ padding: '4px' }}>
                            <Icons.Menu />
                        </button>
                        <h1 style={{ fontSize: '16px', fontWeight: '700', color: '#0f172a', letterSpacing: '-0.01em', margin: 0 }}>Point File Creator</h1>
                    </header>

                    <div className="layout">
                    {/* SIDEBAR */}
                    <div className={`sidebar ${sidebarOpen ? '' : 'collapsed'}`}>
                        <div className="sidebar-tabs">
                            <button className={`tab-btn ${activeTab === 'upload' ? 'active' : ''}`} onClick={() => setActiveTab('upload')}><Icons.Upload /><span>Upload</span></button>
                            <button className={`tab-btn ${activeTab === 'columns' ? 'active' : ''}`} onClick={() => setActiveTab('columns')}><Icons.Columns /><span>Columns</span></button>
                            <button className={`tab-btn ${activeTab === 'style' ? 'active' : ''}`} onClick={() => setActiveTab('style')}><Icons.Style /><span>Style</span></button>
                            <button className={`tab-btn ${activeTab === 'filter' ? 'active' : ''}`} onClick={() => setActiveTab('filter')}><Icons.Filter /><span>Filter</span></button>
                        </div>

                        <div className="sidebar-content" style={{ padding: 0 }}>
                            {activeTab === 'upload' && (
                                <div className="panel">
                                    <div style={{ border: '1px solid #e2e8f0', borderRadius: '8px', overflow: 'hidden', backgroundColor: '#fff' }}>
                                        <div style={{ padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', userSelect: 'none' }} onClick={() => setIsUploadOpen(prev => !prev)}>
                                            <span style={{ fontWeight: 700, fontSize: '11px', color: '#334155' }}>1. FILE UPLOAD</span>
                                            <div style={{ transform: isUploadOpen ? 'rotate(0deg)' : 'rotate(-90deg)', transition: 'transform 0.2s' }}><Icons.Chevron /></div>
                                        </div>
                                        <div style={{ display: isUploadOpen ? 'block' : 'none', padding: '0 16px 16px 16px' }}>
                                            <label className="dropzone">
                                                <input type="file" accept=".csv,.xlsx,.txt" ref={fileInputRef} onChange={handleFileUpload} style={{ display: 'none' }} />
                                                <Icons.CloudUpload />
                                                <div style={{ fontSize: '12px', fontWeight: 600, color: '#0f172a', textAlign: 'center' }}>Drag & Drop or <span style={{ textDecoration: 'underline' }}>Browse</span></div>
                                                <div style={{ fontSize: '10px', color: '#94a3b8', textAlign: 'center' }}>CSV · TXT · XLS · XLSX</div>
                                            </label>
                                            {data.length > 0 && <div style={{ textAlign: 'center', marginTop: '10px', fontSize: '12px', color: '#10b981', fontWeight: 600 }}>✓ {data.length} records loaded</div>}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'columns' && (
                                <div className="panel">
                                    <div style={{ border: '1px solid #e2e8f0', borderRadius: '8px', overflow: 'hidden', backgroundColor: '#fff' }}>
                                        <div style={{ padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', userSelect: 'none' }} onClick={() => setIsColumnsOpen(prev => !prev)}>
                                            <span style={{ fontWeight: 700, fontSize: '11px', color: '#334155' }}>2. LOCATION MAPPING</span>
                                            <div style={{ transform: isColumnsOpen ? 'rotate(0deg)' : 'rotate(-90deg)', transition: 'transform 0.2s' }}><Icons.Chevron /></div>
                                        </div>
                                        <div style={{ display: isColumnsOpen ? 'block' : 'none', padding: '0 16px 16px 16px' }}>
                                            {[{ label: 'Site Name', key: 'siteName' }, { label: 'Latitude', key: 'lat' }, { label: 'Longitude', key: 'lng' }].map(field => (
                                                <div key={field.key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }}>
                                                    <div style={{ fontSize: '11px', fontWeight: 600, color: '#334155' }}>{field.label}</div>
                                                    <select className="form-control" style={{ width: '60%', height: '32px', fontSize: '12px', padding: '0 8px' }} value={mapping[field.key]} onChange={e => setMapping({ ...mapping, [field.key]: e.target.value })}>
                                                        <option value="">-- Select --</option>
                                                        {columns.map(c => <option key={c} value={c}>{c}</option>)}
                                                    </select>
                                                </div>
                                            ))}
                                            <div style={{ fontSize: '11px', fontWeight: 600, color: '#334155', marginTop: '16px', marginBottom: '8px' }}>Popup Columns</div>
                                            <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '10px', marginBottom: '8px' }}>
                                                <button type="button" onClick={() => setMapping({ ...mapping, popupCols: [...columns] })} style={{ fontSize: '11px', color: '#3b82f6', background: 'none', border: 'none', cursor: 'pointer', fontWeight: 600, padding: 0 }}>All Columns</button>
                                                <button type="button" onClick={() => setMapping({ ...mapping, popupCols: [] })} style={{ fontSize: '11px', color: '#64748b', background: 'none', border: 'none', cursor: 'pointer', fontWeight: 600, padding: 0 }}>Clear</button>
                                            </div>
                                            <div style={{ maxHeight: '200px', overflowY: 'auto', border: '1px solid #e2e8f0', borderRadius: '4px', padding: '8px', marginBottom: '16px' }}>
                                                {columns.filter(h => h !== '#').map(h => (
                                                    <label key={h} style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px', cursor: 'pointer' }}>
                                                        <input type="checkbox" style={{ cursor: 'pointer', accentColor: '#334155' }} checked={mapping.popupCols.includes(h)} onChange={e => { const newCols = e.target.checked ? [...mapping.popupCols, h] : mapping.popupCols.filter(c => c !== h); setMapping({ ...mapping, popupCols: newCols }); }} />
                                                        <span style={{ fontSize: '11px', color: '#334155' }}>{h}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'style' && (
                                <div className="panel">
                                    <div style={{ border: '1px solid #e2e8f0', borderRadius: '8px', overflow: 'hidden', backgroundColor: '#fff', marginBottom: '16px' }}>
                                        <div style={{ padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', userSelect: 'none' }} onClick={() => setIsStyleOpen(prev => !prev)}>
                                            <span style={{ fontWeight: 700, fontSize: '11px', color: '#334155' }}>3. MAP APPEARANCE</span>
                                            <div style={{ transform: isStyleOpen ? 'rotate(0deg)' : 'rotate(-90deg)', transition: 'transform 0.2s' }}><Icons.Chevron /></div>
                                        </div>
                                        <div style={{ display: isStyleOpen ? 'block' : 'none', padding: '0 16px 16px 16px' }}>
                                            
                                            <div style={{ marginBottom: '16px' }}>
                                                <div style={{ fontSize: '11px', fontWeight: 600, color: '#334155', marginBottom: '8px' }}>Color Mode</div>
                                                <div className="mode-selector" style={{ marginBottom: 0 }}>
                                                    <div className={`mode-option ${colorMode === 'single' ? 'active' : ''}`}
                                                        onClick={() => setColorMode('single')}>
                                                        Single Color
                                                    </div>
                                                    <div className={`mode-option ${colorMode === 'category' ? 'active' : ''}`}
                                                        onClick={() => setColorMode('category')}>
                                                        Categorized
                                                    </div>
                                                </div>
                                            </div>

                                            {colorMode === 'single' && (
                                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px', padding: '8px', background: '#f8fafc', borderRadius: '6px', cursor: 'pointer' }} onClick={() => { setEditingCategory(null); setShowIconPicker(true); }}>
                                                    <span style={{ fontSize: '11px', color: '#334155' }}>Marker Style</span>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                        <div style={{ width: '24px', height: '24px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#fff', border: '1px solid #e2e8f0', borderRadius: '4px' }}>
                                                            {markerIconUrl === 'VECTOR_CIRCLE' ? <div style={{ background: singleColor, width: '14px', height: '14px', borderRadius: '50%' }}></div> : <img src={markerIconUrl} style={{ maxWidth: '20px', maxHeight: '20px' }} />}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            {colorMode === 'category' && (
                                                <div style={{ marginBottom: '12px' }}>
                                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px' }}>
                                                        <div style={{ fontSize: '11px', fontWeight: 600, color: '#334155' }}>Category Column</div>
                                                    </div>
                                                    <select className="form-control" style={{ width: '100%', height: '32px', fontSize: '12px', padding: '0 8px', marginBottom: '12px' }} value={categoryCol} onChange={e => { setCategoryCol(e.target.value); setManualCategoryStyles({}); }}>
                                                        <option value="">-- Select Column --</option>
                                                        {columns.map(c => <option key={c} value={c}>{c}</option>)}
                                                    </select>
                                                    {categoryCol && uniqueCategoryVals.length > 0 && (
                                                        <div style={{ marginBottom: '12px', padding: '10px', background: '#f1f5f9', borderRadius: '6px' }}>
                                                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '10px' }}>
                                                                <span style={{ fontSize: '11px', fontWeight: 600, color: '#334155' }}>Manual Style List</span>
                                                            </div>
                                                            <div style={{ maxHeight: '150px', overflowY: 'auto' }}>
                                                                {uniqueCategoryVals.map((val, i) => {
                                                                    const defaultColor = PALETTE[i % PALETTE.length];
                                                                    const defaultIcon = DEFAULT_GE_PADDLES[i % DEFAULT_GE_PADDLES.length];
                                                                    const style = manualCategoryStyles[val] || { color: defaultColor, iconUrl: defaultIcon };
                                                                    
                                                                    return (
                                                                        <div key={val} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '8px', padding: '8px', background: '#f8fafc', borderRadius: '6px', cursor: 'pointer' }} onClick={() => { setEditingCategory(val); setShowIconPicker(true); }}>
                                                                            <span style={{ fontSize: '11px', color: '#334155', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{val}</span>
                                                                            <div style={{ width: '24px', height: '24px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#fff', border: '1px solid #e2e8f0', borderRadius: '4px' }}>
                                                                                {style.iconUrl === 'VECTOR_CIRCLE' ? <div style={{ background: style.color, width: '14px', height: '14px', borderRadius: '50%' }}></div> : <img src={getIconUrl(style.iconUrl)} style={{ maxWidth: '20px', maxHeight: '20px' }} />}
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '16px' }}>
                                                <div style={{ fontSize: '11px', fontWeight: 600, color: '#334155' }}>Global Icon Scale</div>
                                                <div style={{ fontSize: '10px', color: '#94a3b8' }}>{markerSize.toFixed(1)}x</div>
                                            </div>
                                            <div style={{ marginTop: '4px' }}>
                                                <input type="range" min="0.5" max="3.0" step="0.1" style={{ width: '100%', height: '4px', accentColor: '#334155' }} value={markerSize} onChange={e => {
                                                    setMarkerSize(parseFloat(e.target.value));
                                                }} />
                                            </div>

                                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '16px' }}>
                                                <div style={{ fontSize: '11px', fontWeight: 600, color: '#334155' }}>Marker Opacity</div>
                                                <div style={{ fontSize: '10px', color: '#94a3b8' }}>{markerOpacity}%</div>
                                            </div>
                                            <div style={{ marginTop: '4px' }}>
                                                <input type="range" min="10" max="100" style={{ width: '100%', height: '4px', accentColor: '#334155' }} value={markerOpacity} onChange={e => {
                                                    setMarkerOpacity(parseInt(e.target.value));
                                                }} />
                                            </div>

<div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '16px', paddingTop: '16px', borderTop: '1px solid #e2e8f0' }}>
                                                <div style={{ fontSize: '11px', fontWeight: 600, color: '#334155' }}>Site Labels</div>
                                                <label className="switch" style={{ position: 'relative', display: 'inline-block', width: '40px', height: '20px' }}>
                                                    <input type="checkbox" checked={showSiteLabels} onChange={e => setShowSiteLabels(e.target.checked)} style={{ opacity: 0, width: 0, height: 0 }} />
                                                    <span style={{ position: 'absolute', cursor: 'pointer', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: showSiteLabels ? '#000000' : '#cbd5e1', transition: '0.4s', borderRadius: '20px' }}></span>
                                                    <span style={{ position: 'absolute', content: '""', height: '14px', width: '14px', left: '3px', bottom: '3px', backgroundColor: 'white', transition: '0.4s', borderRadius: '50%', transform: showSiteLabels ? 'translateX(20px)' : 'translateX(0)' }}></span>
                                                </label>
                                            </div>
                                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '12px' }}>
                                                <div style={{ fontSize: '11px', fontWeight: 600, color: '#334155' }}>Map Legend</div>
                                                <label className="switch" style={{ position: 'relative', display: 'inline-block', width: '40px', height: '20px' }}>
                                                    <input type="checkbox" checked={showLegend} onChange={e => setShowLegend(e.target.checked)} style={{ opacity: 0, width: 0, height: 0 }} />
                                                    <span style={{ position: 'absolute', cursor: 'pointer', top: 0, left: 0, right: 0, bottom: 0, backgroundColor: showLegend ? '#000000' : '#cbd5e1', transition: '0.4s', borderRadius: '20px' }}></span>
                                                    <span style={{ position: 'absolute', content: '""', height: '14px', width: '14px', left: '3px', bottom: '3px', backgroundColor: 'white', transition: '0.4s', borderRadius: '50%', transform: showLegend ? 'translateX(20px)' : 'translateX(0)' }}></span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'filter' && (
                                <div className="panel">
                                    <div style={{ border: '1px solid #e2e8f0', borderRadius: '8px', overflow: 'hidden', backgroundColor: '#fff', marginBottom: '16px' }}>
                                        <div style={{ padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', userSelect: 'none' }} onClick={() => setIsFilterOpen(prev => !prev)}>
                                            <span style={{ fontWeight: 700, fontSize: '11px', color: '#334155' }}>4. SEARCH & FILTER</span>
                                            <div style={{ transform: isFilterOpen ? 'rotate(0deg)' : 'rotate(-90deg)', transition: 'transform 0.2s' }}><Icons.Chevron /></div>
                                        </div>
                                        <div style={{ display: isFilterOpen ? 'block' : 'none', padding: '0 16px 16px 16px' }}>
                                            <div style={{ fontSize: '11px', fontWeight: 600, color: '#334155', marginBottom: '8px' }}>Search</div>
                                            <div style={{ position: 'relative', marginBottom: '16px' }}>
                                                <input type="text" placeholder="Search site..." className="form-control" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} style={{ backgroundColor: '#f8fafc', color: '#0f172a', border: '1px solid #e2e8f0', width: '100%', height: '38px', fontSize: '12px', padding: '0 36px 0 12px', borderRadius: '6px' }} />
                                                <div style={{ position: 'absolute', right: '12px', top: '11px', color: '#94a3b8' }}><Icons.Search /></div>
                                            </div>

                                            <div style={{ fontSize: '11px', fontWeight: 600, color: '#334155', marginBottom: '8px' }}>Column Filter</div>
                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px', marginBottom: '8px' }}>
                                                <select className="form-control" style={{ height: '38px', fontSize: '12px' }} value={filterCol} onChange={handleFilterColChange}>
                                                    <option value="">Select Column...</option>
                                                    {columns.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                                <select className="form-control" style={{ height: '38px', fontSize: '12px' }} value={filterVals.length === 1 ? filterVals[0] : ''} onChange={e => setFilterVals(e.target.value ? [e.target.value] : [])} disabled={!filterCol}>
                                                    <option value="">Select...</option>
                                                    {uniqueFilterVals.map(v => <option key={v} value={v}>{v}</option>)}
                                                </select>
                                            </div>
                                            <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
                                                {(filterCol || filterVals.length > 0 || searchTerm) && (
                                                    <button style={{ fontSize: '11px', color: '#ef4444', background: 'none', border: 'none', cursor: 'pointer', fontWeight: 600, padding: '4px 0' }} onClick={() => { setFilterCol(''); setFilterVals([]); setSearchTerm(''); }}>Clear all filters</button>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Actions Section */}
                                    <div style={{ border: '1px solid #e2e8f0', borderRadius: '8px', overflow: 'hidden', backgroundColor: '#fff' }}>
                                        <div style={{ padding: '12px 16px' }}><span style={{ fontWeight: 700, fontSize: '11px', color: '#334155' }}>5. ACTIONS</span></div>
                                        <div style={{ padding: '0 16px 16px 16px', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                            <button className="btn" onClick={() => {
                                                if (!mapping.lat || !mapping.lng || !data.length) return;
                                                setIsDrawing(true);
                                                setDrawProgress(0);
                                                let progress = 0;
                                                const interval = setInterval(() => {
                                                    progress += Math.random() * 15 + 5;
                                                    if (progress >= 100) { progress = 100; clearInterval(interval); setIsDrawing(false); setShowOnMap(true); }
                                                    setDrawProgress(Math.min(progress, 100));
                                                }, 100);
                                            }} disabled={!mapping.lat || !mapping.lng || !data.length || isDrawing} style={{ backgroundColor: (!mapping.lat || !mapping.lng || !data.length || isDrawing) ? '#94a3b8' : '#0f172a', color: '#fff', border: 'none', width: '100%', height: '36px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', borderRadius: '6px', cursor: (!mapping.lat || !mapping.lng || !data.length || isDrawing) ? 'not-allowed' : 'pointer' }}>
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                                                {isDrawing ? 'Drawing...' : 'Calculate & Draw'}
                                            </button>
                                            {isDrawing && (
                                                <div style={{ width: '100%', display: 'flex', alignItems: 'center', gap: '8px', marginTop: '2px' }}>
                                                    <div style={{ flex: 1, height: '6px', background: '#e2e8f0', borderRadius: '999px', overflow: 'hidden' }}><div style={{ width: `${drawProgress}%`, height: '100%', background: '#0f172a', transition: 'width 0.08s linear' }}></div></div>
                                                    <span style={{ fontSize: '10px', fontWeight: 700, color: '#334155', minWidth: '34px', textAlign: 'right' }}>{Math.round(drawProgress)}%</span>
                                                </div>
                                            )}
                                            <button className="btn" onClick={exportKML} disabled={!mapping.lat || !mapping.lng} style={{ backgroundColor: '#fff', color: '#334155', border: '1px solid #e2e8f0', width: '100%', height: '36px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', borderRadius: '6px', cursor: 'pointer', position: 'relative' }}>
                                                <Icons.Export /> Export KML <div style={{ fontSize: '10px', color: '#94a3b8', position: 'absolute', right: '12px' }}>(Earth)</div>
                                            </button>
                                            <button className="btn" onClick={() => { setShowOnMap(false); setDrawProgress(0); }} disabled={!data.length} style={{ backgroundColor: '#fff', color: '#ef4444', border: '1px solid #fee2e2', width: '100%', height: '36px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', borderRadius: '6px', cursor: 'pointer' }}>
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg> Clear
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className={`main-content ${sidebarOpen ? '' : 'expanded'}`}>
                        <div className="tab-content" style={{ flex: 1, position: 'relative' }}>
                            <div style={{ height: '100%', position: 'relative' }}>
                                <MapLayerSwitcher mapLayer={mapLayer} onLayerChange={setMapLayer} />
                                <MapView
                                    key={`${markerIconUrl}-${JSON.stringify(manualCategoryStyles)}`}
                                    data={showOnMap ? filteredData : []}
                                    mapping={mapping}
                                    markerIconUrl={markerIconUrl}
                                    markerSize={markerSize}
                                    markerOpacity={markerOpacity}
                                    colorMode={colorMode}
                                    singleColor={singleColor}
                                    categoryCol={categoryCol}
                                    colorAssignmentMode={colorAssignmentMode}
                                    manualCategoryStyles={manualCategoryStyles}
                                    mapLayer={mapLayer}
                                    sidebarOpen={sidebarOpen}
                                    showLegend={showLegend}
                                    showSiteLabels={showSiteLabels}
                                />
                            </div>
                        </div>

                        {/* Modals */}
                        <IconPicker
                            isOpen={showIconPicker}
                            onClose={() => { setShowIconPicker(false); setEditingCategory(null); }}
                            onSelect={(url) => {
                                if (editingCategory) {
                                    setManualCategoryStyles({
                                        ...manualCategoryStyles,
                                        [editingCategory]: {
                                            ...(manualCategoryStyles[editingCategory] || {}),
                                            iconUrl: url,
                                            color: manualCategoryStyles[editingCategory]?.color || PALETTE[uniqueCategoryVals.indexOf(editingCategory) % PALETTE.length]
                                        }
                                    });
                                } else {
                                    setMarkerIconUrl(url);
                                }
                            }}
                            currentIconUrl={editingCategory ? (manualCategoryStyles[editingCategory]?.iconUrl || 'VECTOR_CIRCLE') : markerIconUrl}
                            currentSize={markerSize}
                            currentOpacity={markerOpacity}
                            setMarkerSize={setMarkerSize}
                            setMarkerOpacity={setMarkerOpacity}
                        />
                    </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
